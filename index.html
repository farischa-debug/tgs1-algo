<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator Diskon</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #df72ba, #e5876d);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background: #ff6f61;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #e85c50;
        }

        .result {
            margin-top: 20px;
            background: #f1f1f1;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Kalkulator Diskon</h1>

    <label>Harga Awal (Rp):</label>
    <input type="number" id="harga">

    <label>Diskon (%):</label>
    <input type="number" id="diskon">

    <label>Potongan Tambahan (Rp):</label>
    <input type="number" id="tambahan">

    <button onclick="hitungDiskon()">Hitung</button>

    <div class="result" id="hasil" style="display:none;"></div>
</div>

<script>
function hitungDiskon() {
    let harga = parseFloat(document.getElementById("harga").value) || 0;
    let diskon = parseFloat(document.getElementById("diskon").value) || 0;
    let tambahan = parseFloat(document.getElementById("tambahan").value) || 0;

    let potongan = harga * (diskon / 100);
    let hargaSetelahDiskon = harga - potongan;
    let total = hargaSetelahDiskon - tambahan;

    // Format Rupiah
    let hasilFormat = total.toLocaleString('id-ID');

    let hasilDiv = document.getElementById("hasil");
    hasilDiv.style.display = "block";
    hasilDiv.innerHTML = "Total Bayar: Rp " + hasilFormat;
}
</script>

</body>
</html>
